<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Akun Profesional</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #6366f1; 
            --secondary: #ec4899; 
            --bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
        }

        body { 
            font-family: 'Lexend', sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
            width: 350px; 
            text-align: center; 
        }

        /* Menggunakan Montserrat untuk input dan select */
        input, select { 
            width: 100%; 
            padding: 14px; 
            margin: 8px 0; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(to right, var(--primary), var(--secondary)); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700; 
            font-family: 'Montserrat', sans-serif; 
            margin-top: 15px; 
        }

        .phone-group { display: flex; gap: 5px; }
        .hidden { display: none; }
        .jam-style { font-family: 'Montserrat', sans-serif; font-size: 1.5rem; font-weight: 700; color: #4f46e5; margin: 20px 0; }
    </style>
</head>
<body>

<div class="card" id="register-page">
    <h2 style="font-family: 'Montserrat', sans-serif;">Buat Akun Baru</h2>
    <input type="text" id="fn" placeholder="Nama Depan">
    <input type="text" id="ln" placeholder="Nama Belakang">
    <input type="email" id="email" placeholder="Gmail">
    <input type="password" id="pass" placeholder="Password (Min. 6)">
    
    <div class="phone-group">
        <select id="country-code">
            <option value="+62">🇮🇩 +62</option>
            <option value="+1">🇺🇸 +1</option>
        </select>
        <input type="tel" id="phone" placeholder="Nomor Telepon">
    </div>
    
    <button onclick="prosesDaftar()">SIAP BUAT AKUN</button>
</div>

<div class="card hidden" id="profile-page">
    <div style="width: 100px; height: 100px; background: var(--primary); border-radius: 50%; margin: 0 auto 15px; color: white; display: flex; align-items: center; justify-content: center; font-size: 40px;">👤</div>
    <h2 id="out-name" style="font-family: 'Montserrat', sans-serif;"></h2>
    <div id="jam" class="jam-style"></div>
    <button style="background: #10b981;" onclick="verifikasi()">VERIFIKASI NOMOR</button>
</div>

<script>
    function prosesDaftar() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const phone = document.getElementById('phone').value;
        const country = document.getElementById('country-code').value;

        if (!email.includes('@')) { alert("Format Gmail tidak valid!"); return; }
        if (pass.length < 6) { alert("Password minimal 6 karakter!"); return; }

        if (country === "+62") {
            if (!phone.startsWith("08") || phone.length < 10 || phone.length > 13) {
                alert("Untuk Indonesia (+62), nomor harus diawali '08' dan panjang 10-13 digit!");
                return;
            }
        }

        document.getElementById('out-name').innerText = document.getElementById('fn').value + " " + document.getElementById('ln').value;
        document.getElementById('register-page').classList.add('hidden');
        document.getElementById('profile-page').classList.remove('hidden');
    }

    setInterval(() => {
        document.getElementById('jam').innerText = new Date().toLocaleTimeString();
    }, 1000);

    function verifikasi() {
        const code = Math.floor(100000 + Math.random() * 900000);
        const input = prompt("Masukkan 6 angka verifikasi (Simulasi: " + code + "):");
        if(input == code) alert("Berhasil Terverifikasi!");
        else alert("Kode salah.");
    }
</script>

</body>
</html>
